# Self-signed issuer to bootstrap the CA
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "webhook.selfSignedIssuer" . }}
  namespace: {{ .Values.certManagerNamespace }}
  labels:
    {{- include "webhook.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
# CA certificate signed by the self-signed issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "webhook.rootCACertificate" . }}
  namespace: {{ .Values.certManagerNamespace }}
  labels:
    {{- include "webhook.labels" . | nindent 4 }}
spec:
  isCA: true
  commonName: {{ include "webhook.fullname" . }}-ca
  secretName: {{ include "webhook.rootCACertificate" . }}
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ include "webhook.selfSignedIssuer" . }}
    kind: Issuer
---
# CA issuer using our root CA
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "webhook.rootCAIssuer" . }}
  namespace: {{ .Values.certManagerNamespace }}
  labels:
    {{- include "webhook.labels" . | nindent 4 }}
spec:
  ca:
    secretName: {{ include "webhook.rootCACertificate" . }}
---
# Serving certificate for the webhook
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "webhook.servingCertificate" . }}
  namespace: {{ .Values.certManagerNamespace }}
  labels:
    {{- include "webhook.labels" . | nindent 4 }}
spec:
  secretName: {{ include "webhook.servingCertificate" . }}
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  issuerRef:
    name: {{ include "webhook.rootCAIssuer" . }}
    kind: Issuer
  dnsNames:
    - {{ include "webhook.fullname" . }}
    - {{ include "webhook.fullname" . }}.{{ .Values.certManagerNamespace }}
    - {{ include "webhook.fullname" . }}.{{ .Values.certManagerNamespace }}.svc
